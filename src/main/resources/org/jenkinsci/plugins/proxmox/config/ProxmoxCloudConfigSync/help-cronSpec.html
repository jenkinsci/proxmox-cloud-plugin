<div>
    A cron expression that controls how often the configuration is automatically synced from Git.
    Uses Jenkins cron syntax (e.g., <code>H/15 * * * *</code> for every 15 minutes,
    <code>H * * * *</code> for roughly once per hour).
    Leave blank to disable automatic sync. You can always use the "Sync Now" button for manual sync.
</div>
